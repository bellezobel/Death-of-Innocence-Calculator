<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death of the Innocent Companion</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b241b">
<link rel="icon" href="images/icon-small.png">
</head>

<body>

<div class="container">

<img src="images/header.png" class="headerImage">

<div class="tabs">
    <button class="tabButton active" onclick="showTab('weapon', this)">Weapon</button>
    <button class="tabButton" onclick="showTab('spell', this)">Spell</button>
</div>

<div id="weapon" class="tabContent">

<h2>Weapon Calculator</h2>

<label>Weapon</label>

<div class="itemCard">

    <img id="weaponImage"
         class="itemPreview"
         src="images/placeholder.png">

    <div class="itemContent">

        <select id="weaponSelect"></select>

        <div id="weaponInfo"
             class="itemInfo">
        </div>

    </div>

</div>

<label>Base Damage</label>
<input id="weaponBaseAttack" type="number" placeholder="0">

<h3>Modifier</h3>

<label>Skill</label>
<select id="weaponSkill"></select>

<label>Rev</label>
<select id="weaponRev">
<option value="1">None</option>
<option value="1.3">Rev 1</option>
<option value="1.5">Rev 2</option>
</select>

<label>Crit</label>
<select id="weaponCrit">
<option value="1">No</option>
<option value="2">Yes</option>
</select>

<h3>Target</h3>

<div class="doubleInput">

<div>
<label>Resistance</label>
<select id="weaponResistance">
<option value="0">0%</option>
<option value="10">10%</option>
<option value="15">15%</option>
<option value="20">20%</option>
</select>
</div>

<div>
<label>Weakness</label>
<select id="weaponWeakness">
<option value="0">0%</option>
<option value="10">10%</option>
<option value="15">15%</option>
<option value="20">20%</option>
</select>
</div>

</div>

<h3>Status Effects</h3>
<div id="statusContainer" class="iconGrid"></div>

<h3>Buffs</h3>
<div id="buffContainer" class="iconGrid"></div>

<button onclick="calculateWeapon()">Calculate</button>

<div class="result">
Final Damage
<span id="weaponResult">0</span>
</div>

</div>

<div id="spell" class="tabContent hidden">

<h2>Spell Calculator</h2>

<label>Spell</label>

<div class="itemCard">

<img id="spellImage"
     class="itemPreview"
     src="images/placeholder.png">

<div class="itemContent">

<select id="spellSelect"></select>

<div id="spellInfo"
     class="itemInfo"></div>

</div>

</div>

<label>Base Magic Attack</label>
<input id="spellBaseAttack" type="number" placeholder="0">

<h3>Accessories</h3>

<div class="accessoryGrid">

<div class="accessorySlot">
<img id="accessoryImage1" class="itemPreview small" src="images/placeholder.png">
<select id="spellAccessory1"></select>
</div>

<div class="accessorySlot">
<img id="accessoryImage2" class="itemPreview small" src="images/placeholder.png">
<select id="spellAccessory2"></select>
</div>

<div class="accessorySlot">
<img id="accessoryImage3" class="itemPreview small" src="images/placeholder.png">
<select id="spellAccessory3"></select>
</div>

</div>

<!-- Remaining spell controls can stay as in your current version -->
</div>

<h2>Coin Flip</h2>

<button onclick="coinFlip()">Flip Coin</button>

<div class="coinContainer">
<img id="coinResult"
     src="images/coinhead.gif"
     class="coinImage">
</div>

</div>

<script src="js/database-weapons.js"></script>
<script src="js/database-spells.js"></script>
<script src="js/database-accessories.js"></script>
<script src="js/database-skills.js"></script>
<script src="js/database-status.js"></script>
<script src="js/database-buffs.js"></script>
<script src="js/script.js"></script>

</body>
</html>
